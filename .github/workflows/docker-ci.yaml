name: Docker CI

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/3lc-ultralytics
          tags: |
            type=sha,format=short
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run tests in Docker
        run: |
          docker run \
            -v ${{ github.workspace }}:/app/3lc-ultralytics \
            -e TLC_API_KEY=${{ secrets.TLC_API_KEY }} \
            -e $(echo ${{ secrets.VARIABLE_NAME }})=${{ secrets.VARIABLE_VALUE }} \
            -e $(echo ${{ secrets.RUNTIME_NAME }})=${{ secrets.RUNTIME_VALUE }} \
            ${{ steps.meta.outputs.tags }}
